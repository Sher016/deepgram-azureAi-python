services:
  api:
    build: ./
    container_name: ai_api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=ai_assessment
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy 
    volumes:
      - ./infra/uploads:/app/uploads
      - ./api/app:/api/app

  db:
    image: postgres:15
    container_name: ai_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345
      - POSTGRES_DB=ai_assessment
    ports:
      - "5434:5432"
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./infra/postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql